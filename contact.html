<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initiate Architecture | Creator Architect Consultation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&amp;family=Inter:wght@200;300;400;500;600&amp;display=swap" rel="stylesheet">
    
    <style>
        /* GLOBAL LUXURY STYLES & RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #050505;
            color: #EAEAEA;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* FIXED FLOATING NAVIGATION DRAWER WITH EXPLICIT MENUS */
        .site-navigation-drawer {
            max-width: 100%;
            margin: 0 auto;
            padding: 25px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            background-color: #050505;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .site-brand-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #FFF;
        }
        .nav-links-wrapper {
            display: flex;
            gap: 35px;
            align-items: center;
        }
        .nav-item-link {
            color: #999;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 2px;
            text-decoration: none;
            font-weight: 400;
            transition: color 0.3s ease;
        }
        .nav-item-link:hover {
            color: #C5A880;
        }

        /* MOBILE HAMBURGER BUTTON */
        .mobile-menu-toggle {
            display: none;
            flex-direction: column;
            justify-content: space-between;
            width: 24px;
            height: 18px;
            background: transparent;
            border: none;
            cursor: pointer;
            z-index: 1100;
        }
        .mobile-menu-toggle span {
            width: 100%;
            height: 1px;
            background-color: #FFF;
            transition: all 0.3s ease;
        }

        /* Animated state when menu is open */
        .mobile-menu-toggle.active span:nth-child(1) {
            transform: translateY(8px) rotate(45deg);
        }
        .mobile-menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }
        .mobile-menu-toggle.active span:nth-child(3) {
            transform: translateY(-9px) rotate(-45deg);
        }

        /* CONTACT RENDER ENVIRONMENT */
        .contact-container {
            min-height: calc(100vh - 79px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            background: radial-gradient(circle at center, #111111 0%, #050505 100%);
        }
        .contact-header {
            text-align: center;
            margin-bottom: 40px;
            max-width: 700px;
        }
        .contact-subtitle {
            color: #C5A880;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 15px;
            font-weight: 600;
        }
        .contact-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 42px;
            font-weight: 400;
            letter-spacing: 1px;
            line-height: 1.2;
            text-transform: uppercase;
            color: #EAEAEA;
            margin-bottom: 20px;
        }
        .contact-lead {
            font-size: 15px;
            color: #888888;
            line-height: 1.6;
        }

        /* PREMIUM BUTTON TO REVEAL CALENDAR */
        .reveal-trigger-btn {
            display: inline-block;
            border: 1px solid #C5A880;
            color: #C5A880;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 3px;
            padding: 20px 60px;
            font-weight: 400;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            background: transparent;
            border-radius: 2px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .reveal-trigger-btn:hover {
            background-color: #C5A880;
            color: #050505;
            box-shadow: 0 15px 30px rgba(197, 168, 128, 0.2);
            transform: translateY(-2px);
        }

        /* CALENDAR CONTAINER EMBED PANEL (HIDDEN BY DEFAULT) */
        .calendar-embed-card {
            display: none; /* Hidden on layout startup */
            width: 100%;
            max-width: 1000px;
            background-color: #111111;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.04);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
            min-height: 700px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        /* Revealed Class via JavaScript */
        .calendar-embed-card.show-framework {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* BACK TO HOME NAVLINK */
        .back-home-link {
            margin-top: 40px;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #7A7A7A;
            text-decoration: none;
            transition: color 0.3s ease;
            font-weight: 600;
        }
        .back-home-link:hover {
            color: #C5A880;
        }

        /* ======================================================= */
        /* HIGH-END RESPONSIVE SYSTEM OVERRIDES                    */
        /* ======================================================= */
        @media (max-width: 900px) {
            .site-navigation-drawer { 
                padding: 20px 6%; 
            }
            .mobile-menu-toggle {
                display: flex;
            }
            .nav-links-wrapper {
                position: fixed;
                top: 0;
                right: -100%;
                width: 75%;
                height: 100vh;
                background-color: #0A0A0A;
                border-left: 1px solid rgba(255, 255, 255, 0.05);
                flex-direction: column;
                justify-content: center;
                gap: 40px;
                padding: 40px;
                transition: right 0.4s cubic-bezier(0.25, 1, 0.5, 1);
                z-index: 1050;
            }
            .nav-links-wrapper.open {
                right: 0;
            }
            .nav-item-link {
                font-size: 16px;
                letter-spacing: 3px;
                width: 100%;
                text-align: left;
                padding: 10px 0;
                border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            }
        }

       @media (max-width: 767px) {
    .contact-container {
        padding: 60px 15px;
    }
    .contact-title {
        font-size: 26px;
    }
    .contact-lead {
        font-size: 13px;
    }
    .calendar-embed-card {
        min-height: 600px;
    }
    .reveal-trigger-btn {
        width: auto;
        display: inline-block;
        padding: 16px 30px; /* Reduced side padding so it fits easily on narrow mobile screens */
        font-size: 11px;    /* Slightly smaller font to prevent text wrapping layout issues */
        text-align: center;
    }
}
    </style>
</head>
<body>

    <!-- 1. FIXED FLOATING NAVIGATION DRAWER -->
    <nav class="site-navigation-drawer">
        <div class="site-brand-logo">CREATOR PORTFOLIO</div>
        
        <button class="mobile-menu-toggle" id="menuToggle" aria-label="Toggle Navigation">
            <span></span>
            <span></span>
            <span></span>
        </button>

       <!-- Fixed to link locally based on your folder setup -->
<div class="nav-links-wrapper" id="navLinks">
    <a href="index.html" class="nav-item-link" onclick="closeMenu()">Home</a>
    <a href="Portfolio.html" class="nav-item-link" onclick="closeMenu()">Portfolio</a>
    <a href="Investment.html" class="nav-item-link" onclick="closeMenu()">Investment</a>
    <a href="contact.html" class="nav-item-link" onclick="closeMenu()">Contact</a>
</div>
    </nav>

    <!-- 2. MAIN APPLICATION CONTENT AREA -->
    <main class="contact-container">
        
        <div class="contact-header">
            <div class="contact-subtitle">Secure System Architecture</div>
            <h1 class="contact-title">Select Your Discovery Slot</h1>
            <p class="contact-lead">Pick a highly convenient time block below to map out your custom portfolio framework layout directly with our head digital architect.</p>
            
            <!-- The Action Trigger Button -->
            <button class="reveal-trigger-btn" id="bookSlotBtn">Book A Slot ↓</button>
        </div>

        <!-- Hidden by default until button click -->
        <div class="calendar-embed-card" id="calendarCard">
            <div class="calendly-inline-widget" data-url="https://calendly.com/pushparajub10/50min?hide_landing_page_details=1&amp;hide_gdpr_banner=1&amp;background_color=111111&amp;text_color=eaeaea&amp;primary_color=c5a880" style="min-width:320px;height:700px;"></div>
            <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
        </div>

        <a href="index.html" class="back-home-link">← Return To Main Dashboard</a>

    </main>

    <!-- INTERACTIVE EVENT ACTION LOGIC -->
    <script>
        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');
        const bookSlotBtn = document.getElementById('bookSlotBtn');
        const calendarCard = document.getElementById('calendarCard');

        // Toggle opened/closed navigation classes on hamburger icon clicks
        menuToggle.addEventListener('click', () => {
            menuToggle.classList.toggle('active');
            navLinks.classList.toggle('open');
        });

        // Auto-close overlay drawer panel when a link executes
        function closeMenu() {
            menuToggle.classList.remove('active');
            navLinks.classList.remove('open');
        }

        // EXCLUSIVE INTERACTIVE REVEAL MECHANIC FOR THE CALENDLY CONTAINER
        bookSlotBtn.addEventListener('click', () => {
            // Hide the trigger button smoothly
            bookSlotBtn.style.display = 'none';
            
            // Render and bring the dynamic calendar card layout into visual focus
            calendarCard.classList.add('show-framework');
        });
    </script>

    <!-- CLEANUP Theme Overrides -->
    <style>
        footer.site-footer, 
        .ast-small-footer,
        #colophon {
            display: none !important;
        }
    </style>
</body>
</html>
